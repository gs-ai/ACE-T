ransomware_live:
  enabled: true
  api_base: "https://api-pro.ransomware.live/victims/search"
  public_api_base: "https://api.ransomware.live/v2/recentvictims"
  query: "law"
  query_terms:
    - law
    - legal
    - attorney
    - attorneys
    - law firm
    - law firms
    - lawyer
    - lawyers
    - solicitor
    - solicitors
    - barrister
    - barristers
    - counsel
  category_queries:
    Government:
      - government
      - municipality
      - county
      - city
      - state
      - police
      - sheriff
      - law enforcement
    Manufacturing:
      - manufacturing
      - manufacturer
      - factory
      - industrial
      - fabrication
    Technology:
      - technology
      - software
      - saas
      - cloud
      - it services
    Healthcare:
      - healthcare
      - hospital
      - clinic
      - medical
      - pharmacy
    Financial Services:
      - bank
      - banking
      - finance
      - financial
      - insurance
    Construction:
      - construction
      - builder
      - contractor
      - engineering
    Business Services:
      - consulting
      - services
      - staffing
      - accounting
    Education:
      - education
      - university
      - college
      - school
    Energy:
      - energy
      - oil
      - gas
      - utility
      - power
    Transportation:
      - logistics
      - transport
      - transportation
      - freight
      - shipping
  order: "discovered"
  min_interval_minutes: 60
  daily_limit: 200

abuse_ch:
  threatfox:
    enabled: true
    url: "https://threatfox.abuse.ch/export/json/recent/"
    type: "json"
  urlhaus:
    enabled: true
    url: "https://urlhaus.abuse.ch/downloads/csv_recent/"
    type: "csv"
  feodotracker:
    enabled: true
    url: "https://feodotracker.abuse.ch/downloads/ipblocklist.csv"
    type: "csv"
  ja3:
    enabled: false

c2_intel:
  c2intelfeeds_verified:
    enabled: true
    url: "https://raw.githubusercontent.com/drb-ra/C2IntelFeeds/master/feeds/IPC2s.csv"
    type: "csv"
    indicator_type: "ip"
    indicator_column: "ip"
  c2intelfeeds_30d:
    enabled: true
    url: "https://raw.githubusercontent.com/drb-ra/C2IntelFeeds/master/feeds/IPC2s-30day.csv"
    type: "csv"
    indicator_type: "ip"
    indicator_column: "ip"
  montysecurity_c2:
    enabled: true
    url: "https://raw.githubusercontent.com/montysecurity/C2-Tracker/main/data/all.txt"
    type: "txt"
    indicator_type: "ip"
  carbon_black_shadowpad:
    enabled: true
    url: "https://raw.githubusercontent.com/carbonblack/active_c2_ioc_public/main/shadowpad/shadowpad_202210.tsv"
    type: "tsv"
    indicator_type: "ip"
    indicator_column: "c2_ip"

reputation:
  blocklist_de:
    enabled: true
    url: "https://lists.blocklist.de/lists/all.txt"
    type: "txt"
    indicator_type: "ip"
  ipsum:
    enabled: true
    base_url: "https://raw.githubusercontent.com/stamparm/ipsum/master/levels"
    levels: [3, 4, 5, 6, 7, 8]
    type: "txt"
    indicator_type: "ip"
  alienvault:
    enabled: false
  proofpoint_compromised:
    enabled: false

background:
  cisa_kev:
    enabled: true
    url: "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"
  nvd_cve:
    enabled: false
    url: "https://services.nvd.nist.gov/rest/json/cves/2.0"
  ecrimelabs_cve:
    enabled: false
  tool_fingerprints_dir: "data/tool_fingerprints"
