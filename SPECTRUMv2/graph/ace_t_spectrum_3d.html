<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE-T Intelligence Graph - 3D Visualization v2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000000;
            color: #00E5FF;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #three-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Intelligence-grade UI */
        .intel-header {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #00E5FF;
            border-radius: 5px;
            padding: 10px;
            font-size: 12px;
            z-index: 1000;
            -webkit-backdrop-filter: blur(5px);
            backdrop-filter: blur(5px);
        }

        .intel-title {
            color: #00E5FF;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .intel-controls {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .control-label {
            color: #00E5FF;
            font-size: 10px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .control-input {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid #00E5FF;
            color: #00E5FF;
            padding: 3px 6px;
            border-radius: 3px;
            font-size: 11px;
            min-width: 80px;
        }

        .control-input:focus {
            outline: none;
            box-shadow: 0 0 5px #00E5FF;
        }

        .intel-button {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid #00E5FF;
            color: #00E5FF;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .intel-button:hover {
            background: rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 8px #00E5FF;
        }

        .intel-button.active {
            background: #00E5FF;
            color: #000000;
        }
        .edge-toggles {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 10px;
            max-width: 360px;
        }
        .edge-toggle {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            color: #00E5FF;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .edge-toggle input {
            accent-color: #00E5FF;
        }

        /* Panel for node details */
        .intel-panel {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 300px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #00E5FF;
            border-radius: 5px;
            padding: 15px;
            font-size: 11px;
            z-index: 1000;
            -webkit-backdrop-filter: blur(5px);
            backdrop-filter: blur(5px);
            max-height: 400px;
            overflow-y: auto;
            scrollbar-color: #0a0a0a #000000;
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            position: relative;
        }
        .panel-close {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 18px;
            height: 18px;
            border-radius: 9px;
            border: 1px solid rgba(0,229,255,0.7);
            background: rgba(0,0,0,0.7);
            color: #00E5FF;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            line-height: 16px;
            padding: 0;
            cursor: pointer;
        }
        .panel-close:hover {
            background: rgba(0,229,255,0.1);
        }

        .intel-panel::-webkit-scrollbar {
            width: 8px;
        }

        .intel-panel::-webkit-scrollbar-track {
            background: #000000;
        }

        .intel-panel::-webkit-scrollbar-thumb {
            background: #0a0a0a;
            border-radius: 6px;
            border: 1px solid #000000;
        }

        .legend-list {
            scrollbar-color: #0a0a0a #000000;
        }

        .legend-list::-webkit-scrollbar {
            width: 8px;
        }

        .legend-list::-webkit-scrollbar-track {
            background: #000000;
        }

        .legend-list::-webkit-scrollbar-thumb {
            background: #0a0a0a;
            border-radius: 6px;
            border: 1px solid #000000;
        }

        .panel-title {
            color: #00E5FF;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
            border-bottom: 1px solid #00E5FF;
            padding-bottom: 5px;
        }

        .panel-content {
            color: #FFFFFF;
        }

        .panel-field {
            margin-bottom: 8px;
        }

        .field-label {
            color: #00E5FF;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 9px;
        }

        .field-value {
            color: #FFFFFF;
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        /* make long labels wrap and preserve line breaks */
        .field-value.label {
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        .field-links {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-link {
            color: #00E5FF;
            text-decoration: none;
        }

        .field-link:hover {
            text-decoration: underline;
        }

        /* Legend */
        .intel-legend {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #00E5FF;
            border-radius: 6px;
            padding: 6px 8px;
            font-size: 10px;
            z-index: 1000;
            -webkit-backdrop-filter: blur(5px);
            backdrop-filter: blur(5px);
            width: 220px;
            min-width: 180px;
            max-width: 45vw;
            overflow: hidden;
        }

        .intel-legend summary {
            list-style: none;
            cursor: pointer;
            color: #00E5FF;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 4px 2px 6px 2px;
            border-bottom: 1px solid rgba(0, 229, 255, 0.45);
        }

        .intel-legend summary::-webkit-details-marker {
            display: none;
        }

        .legend-caret {
            font-size: 11px;
            transition: transform 160ms ease;
        }

        .intel-legend[open] .legend-caret {
            transform: rotate(180deg);
        }

        .legend-list {
            margin-top: 6px;
            max-height: calc(100vh - 180px);
            overflow-y: auto;
            padding-right: 3px;
        }

        .legend-item {
            display: grid;
            grid-template-columns: 10px minmax(0, 1fr) auto;
            align-items: center;
            margin-bottom: 4px;
            padding: 4px;
            border-radius: 6px;
            transition: background 140ms ease, transform 140ms ease;
            column-gap: 6px;
        }

        .legend-item.inactive { opacity: 0.28; transform: translateY(0px); }
        .legend-item:hover { background: rgba(0,229,255,0.02); transform: translateY(-2px); cursor: pointer; }
        .legend-item.category-item { cursor: pointer; }
        .legend-item.category-item:hover { background: rgba(0,229,255,0.02); transform: translateY(-2px); }
        .legend-item.category-item.inactive { opacity: 0.28; }

        .time-toggle {
            display: flex;
            gap: 6px;
        }

        .intel-button.small {
            padding: 4px 8px;
            font-size: 9px;
            letter-spacing: 0.06em;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            margin-right: 8px;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .legend-label {
            color: #FFFFFF;
            text-transform: uppercase;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.06em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .legend-count {
            min-width: 28px;
            text-align: right;
            color: rgba(255,255,255,0.62);
            font-weight: 700;
            letter-spacing: 0.04em;
            font-size: 9px;
        }

        .legend-resizer {
            position: absolute;
            left: -6px;
            top: 0;
            width: 12px;
            height: 100%;
            cursor: ew-resize;
            z-index: 1001;
        }

        .legend-section-title {
            margin-top: 8px;
            padding-top: 5px;
            border-top: 1px solid rgba(0, 229, 255, 0.2);
            color: rgba(0, 229, 255, 0.85);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 700;
            font-size: 9px;
        }

        .legend-list--categories {
            max-height: none;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            column-gap: 8px;
            row-gap: 4px;
            padding-right: 0;
        }

        .legend-list--categories .legend-item {
            margin-bottom: 0;
            padding: 3px 4px;
        }

        /* Status indicators */
        .status-indicator {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #00E5FF;
            border-radius: 5px;
            padding: 8px;
            font-size: 10px;
            z-index: 1000;
            -webkit-backdrop-filter: blur(5px);
            backdrop-filter: blur(5px);
        }

        .status-text {
            color: #00E5FF;
            text-transform: uppercase;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            -webkit-backdrop-filter: blur(5px);
            backdrop-filter: blur(5px);
        }

        .loading-text {
            color: #00E5FF;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Hide elements initially */
        .intel-panel, .intel-legend, .status-indicator {
            display: none;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="three-canvas"></canvas>

        <!-- Intelligence Header -->
        <div class="intel-header">
            <div class="intel-title">ACE-T Intelligence Graph</div>
            <div class="intel-controls">
                <div class="control-group">
                    <label class="control-label">Search</label>
                    <input type="text" id="search-input" class="control-input" placeholder="Search nodes...">
                </div>
                <div class="control-group">
                    <label class="control-label">Time Window</label>
                    <div class="time-toggle" id="time-toggle">
                        <button class="intel-button small" data-window="all">All</button>
                        <button class="intel-button small" data-window="30d">30 Days</button>
                        <button class="intel-button small" data-window="7d">7 Days</button>
                        <button class="intel-button small active" data-window="24h">24 Hours</button>
                    </div>
                </div>
                <div class="control-group">
                    <label class="control-label">Edges</label>
                    <div class="edge-toggles">
                        <label class="edge-toggle"><input type="checkbox" data-edge="SAME_GROUP" checked>Group</label>
                        <label class="edge-toggle"><input type="checkbox" data-edge="TIME_CLUSTER">Time</label>
                        <label class="edge-toggle"><input type="checkbox" data-edge="DOMAIN_PATTERN_MATCH">Domain</label>
                        <label class="edge-toggle"><input type="checkbox" data-edge="GROUP_SECTOR_OVERLAP">Group+Sector</label>
                        <label class="edge-toggle"><input type="checkbox" data-edge="GROUP_COUNTRY_OVERLAP">Group+Country</label>
                        <label class="edge-toggle"><input type="checkbox" data-edge="CROSS_GROUP_SECTOR">Cross-Sector</label>
                    </div>
                </div>
                <button id="fit-button" class="intel-button">Fit View</button>
                <button id="spin-button" class="intel-button active">Auto Spin</button>
                <button id="tumbler-button" class="intel-button small active">Tumbler: Split</button>
                <button id="reset-button" class="intel-button">Reset</button>
            </div>
        </div>

        <!-- Node Details Panel -->
        <div class="intel-panel" id="node-panel">
            <div class="panel-header">
                <div class="panel-title">Node Details</div>
                <button class="panel-close" id="panel-close" aria-label="Close node details">×</button>
            </div>
            <div class="panel-content" id="panel-content">
            </div>
        </div>

        <!-- Legend -->
        <details class="intel-legend" id="legend" open>
            <summary>
                Sources
                <span class="legend-caret">▾</span>
            </summary>
            <div class="legend-resizer" id="legend-resizer" title="Drag to resize"></div>
            <div class="legend-list" id="legend-content"></div>
            <div class="legend-section-title">Categories</div>
            <div class="legend-list legend-list--categories" id="category-legend-content"></div>
        </details>

        <!-- Status Indicator -->
        <div class="status-indicator">
            <div class="status-text" id="status-text">Initializing...</div>
        </div>

        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loading-overlay">
            <div class="loading-text">Loading Intelligence Data...</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from '/three/vendor/three.module.js';
        import { OrbitControls } from '/three/vendor/controls/OrbitControls.js';
        import { Line2 } from '/three/vendor/lines/Line2.js';
        import { LineMaterial } from '/three/vendor/lines/LineMaterial.js';
        import { LineGeometry } from '/three/vendor/lines/LineGeometry.js';

        // Intelligence Graph Configuration
        const CONFIG = {
            backgroundColor: 0x000000,
            nodeColor: 0x00E5FF,
            edgeColor: 0x00E5FF,
            nodeOpacity: 0.9,
            depthBoost: 2.8,
            depthJitter: 70.0,
            surveillanceColors: {
                low: 0xFFB347,    // Amber
                moderate: 0x00D0FF, // Cyan
                high: 0xFF3B7A   // Magenta
            },
            zPlanes: {
                temporal: -100,
                confidence: 0,
                source: 100
            },
            crystalGeometry: {
                // Restore larger crystal size for better visibility
                radius: 14.0,
                detail: 2
            },
            nodeRadius: {
                base: 7.2,
                scale: 3.6,
                min: 3.4,
                max: 26.0
            },
            animation: {
                pulseSpeed: 2.0,
                rotationSpeed: 0.0028,
                wheelSpeed: 0.18,
                surveillancePulseMultiplier: 1.5,
                materializeDuration: 1800
            },
            performance: {
                maxPixelRatio: 2.5,
                maxEdgesPerNode: 6
            },
            sourceBands: {
                spacing: 220,
                jitter: 60
            },
            triAxis: {
                laneCount: 3,
                laneSpacing: 220,
                laneJitter: 18,
                laneSpin: [1, -1, 1],
                ringRadius: 210,
                ringStep: 86,
                ringVariance: 18,
                ringNoise: 3
            },
            layoutSafety: {
                enabled: true,
                minGap: 2.2,
                separationStrength: 0.6,
                edgeClearance: 2.0,
                edgePush: 0.65,
                edgeBendStrength: 0.5,
                cellSize: 48,
                edgeCheckInterval: 0.35,
                maxEdgeSamples: 28
            }
        };

        const CATEGORY_COLORS = {
            'Law': '#ff1a1a',
            'Government': '#5fd1ff',
            'Manufacturing': '#ff7a8a',
            'Technology': '#ff9a3c',
            'Healthcare': '#ffd452',
            'Financial Services': '#43d6c6',
            'Construction': '#7ab6ff',
            'Business Services': '#b27cff',
            'Education': '#c8ced6',
            'Energy': '#5b8cff',
            'Transportation': '#ff8f66',
            'ThreatFox': '#39ff14',
            'URLhaus': '#00c8ff'
        };

        class IntelligenceGraph3D {
            constructor() {
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.controls = null;
                this.nodes = [];
                this.edges = [];
                this.nodeMeshes = [];
                this.instancedMeshes = [];
                this.instancedGlowMeshes = [];
                this.instancedCoreGlowMeshes = [];
                this.sharedNodeGeometry = null;
                this.edgeLines = [];
                this.proxyEdges = [];
                this.clusters = {};
                this.selectedNode = null;
                this.autoSpin = true;
                this.clock = new THREE.Clock();
                this.pollHandle = null;
                this.nodeState = new Map();
                this.edgeState = [];
                this.nodeMeshesById = {};
                this.dragging = null;
                this.dragMoved = false;
                this.lastPointerHit = null;
                this.suppressClick = false;
                this.autoSpinBeforeDrag = null;
                this.searchQuery = '';
                this.timeWindow = '24h';
                this.sourceDefs = null;
                this.activeSources = null;
                this.activeCategories = null;
                this.metaSources = null;
                this.metaClusters = null;
                this.allowAutoExpand = false;
                this.enableAutoCollapse = false;
                this.spinSplit = true;
                this.sourceSpinDirection = {};
                this.sourceLaneMap = {};
                this.laneColorMap = {};
                this.graphEndpoint = null;
                this.loadRetryHandle = null;
                this.activeEdgeTypes = null;
                this.enablePolling = true;
                this.pollIntervalMs = 10000;
                this.physicsActiveUntil = 0;
                this.spinAngle = 0;
                this.physics = {
                    enabled: false,
                    springK: 0.0022,
                    tetherK: 0.0028,
                    damping: 0.84,
                    maxVelocity: 3.2,
                    dragStrength: 0.55,
                    dragDirect: 0.18,
                    repulseK: 0.22,
                    noiseK: 0.0
                };
                this.layoutSafetyState = { lastEdgeCheck: 0 };
                this.layoutSafetyActiveUntil = 0;
                this.spinHub = new THREE.Vector3(0, 0, 0);
                this._glowTemp = new THREE.Object3D();
                this.materialize = null;
                this.materializePositions = null;
                this.materializeOrigin = null;
                this.pendingMaterialize = false;

                this.init();
                this.setupEventListeners();
                // Fetch canonical source defs first so legend can include all sources (even with 0 count)
                this.fetchSourceDefs().then(() => this.loadData());
                this.animate();
            }

            async fetchSourceDefs() {
                const endpoints = ['/data/sources.json', '/sources'];
                let lastError = null;
                for (const url of endpoints) {
                    try {
                        const resp = await fetch(url, { cache: 'no-store' });
                        if (!resp.ok) {
                            lastError = new Error(`HTTP ${resp.status}`);
                            continue;
                        }
                        const j = await resp.json();
                        this.sourceDefs = {};
                        (j.sources || []).forEach(s => { this.sourceDefs[s.name] = s.color; });
                        // Active set initially includes all known sources
                        this.activeSources = new Set(Object.keys(this.sourceDefs));
                        return;
                    } catch (e) {
                        lastError = e;
                    }
                }
                if (lastError) {
                    console.warn('[3D] Source defs unavailable', lastError);
                }
                this.sourceDefs = null;
                this.activeSources = null;
            }

            getGraphEndpointList() {
                if (this.graphEndpoint) return [this.graphEndpoint];
                return ['/graph_3d_render.json', '/graph_3d.json', '/graph.json', '/data/graph_3d.json'];
            }

            async fetchGraphPayload() {
                const endpoints = this.getGraphEndpointList();
                let lastError = null;
                for (const url of endpoints) {
                    try {
                        const requestUrl = `${url}${url.includes('?') ? '&' : '?'}t=${Date.now()}`;
                        console.log(`[3D] Fetching ${requestUrl}`);
                        const response = await fetch(requestUrl, { cache: 'no-store' });
                        console.log('[3D] Fetch response', response.status, response.statusText);
                        if (!response.ok) {
                            const txt = await response.text().catch(() => '<no-body>');
                            console.warn('[3D] Non-OK response from', url, response.status, txt);
                            lastError = new Error(`HTTP ${response.status}`);
                            continue;
                        }
                        const data = await response.json();
                        this.graphEndpoint = url;
                        return { data, response };
                    } catch (e) {
                        console.warn('[3D] Failed to fetch', url, e);
                        lastError = e;
                    }
                }
                throw lastError || new Error('No graph endpoint responded');
            }

            mergeSourceDefsFromNodes() {
                const defs = this.sourceDefs || {};
                this.sourceDefs = defs;
                let updated = false;
                if (Array.isArray(this.metaSources)) {
                    this.metaSources.forEach(s => {
                        if (!s || !s.name) return;
                        const key = String(s.name).toLowerCase();
                        if (!defs[key] && s.color) {
                            defs[key] = s.color;
                            updated = true;
                        }
                    });
                }
                (this.nodes || []).forEach(n => {
                    const key = this.getSourceKey(n);
                    if (!key) return;
                    if (!defs[key]) {
                        const color = n.source_color || n.sourceColor || this.getSourceColor(key);
                        defs[key] = color;
                        updated = true;
                    }
                });
                if (!this.activeSources || this.activeSources.size === 0) {
                    const keys = Object.keys(defs);
                    if (keys.length) this.activeSources = new Set(keys);
                }
                return updated;
            }

            getActiveSourceSet() {
                if (this.activeSources && this.activeSources.size > 0) return this.activeSources;
                const defs = this.sourceDefs || {};
                const keys = Object.keys(defs);
                if (keys.length) return new Set(keys);
                return null;
            }

            getActiveEdgeTypes() {
                if (this.activeEdgeTypes && this.activeEdgeTypes.size > 0) return this.activeEdgeTypes;
                const toggles = Array.from(document.querySelectorAll('[data-edge]'));
                const enabled = toggles.filter(t => t.checked).map(t => t.getAttribute('data-edge'));
                if (!enabled.length) {
                    return new Set(['SAME_GROUP']);
                }
                return new Set(enabled);
            }

            scheduleLoadRetry() {
                if (this.loadRetryHandle) return;
                this.loadRetryHandle = setTimeout(() => {
                    this.loadRetryHandle = null;
                    this.loadData();
                }, 2000);
            }

            getSourceKey(node) {
                if (!node) return '';
                const sourceKey = (node.source_key || '').trim();
                if (sourceKey) return sourceKey.toLowerCase();
                const source = (node.source || '').trim();
                if (source) return source.toLowerCase();
                const sub = (node.subsource || '').trim();
                if (sub) return sub.toLowerCase();
                return '';
            }

            buildSearchText(node) {
                const parts = [
                    node && node.id,
                    node && node.label,
                    node && node.name,
                    node && node.title,
                    node && node.kind,
                    node && node.severity,
                    node && node.source,
                    node && node.subsource,
                    node && node.victim_name,
                    node && node.victim_domain,
                    node && node.group,
                    node && node.sector,
                    node && node.country,
                    node && node.description,
                    node && node.source_url,
                    node && node.url,
                    node && node.post_url,
                    node && node.author_url,
                    node && node.indicator,
                    node && node.ioc_type
                ];
                if (node && Array.isArray(node.tags)) {
                    parts.push(...node.tags);
                }
                if (node && node.payload && typeof node.payload === 'object') {
                    const payload = node.payload;
                    const payloadKeys = [
                        'title', 'name', 'description', 'summary', 'content', 'context',
                        'victim', 'victim_name', 'group', 'sector', 'country', 'source', 'url', 'post_url'
                    ];
                    payloadKeys.forEach((k) => {
                        if (payload[k]) parts.push(payload[k]);
                    });
                }
                return parts.filter(Boolean).join(' ').toLowerCase();
            }

            getBlendTarget(node) {
                const baseKey = this.getSourceKey(node);
                const counts = (this.adjacency && node && node.id) ? (this.adjacency[node.id] || {}) : {};
                let topKey = null;
                let topCount = 0;
                let total = 0;
                Object.keys(counts).forEach(key => {
                    const count = counts[key] || 0;
                    total += count;
                    if (key && key !== baseKey && count > topCount) {
                        topKey = key;
                        topCount = count;
                    }
                });
                if (!topKey || topCount <= 0) return null;
                const strength = Math.min(0.65, topCount / Math.max(1, total));
                return { key: topKey, strength };
            }

            getSpectrumValue(node) {
                if (!node) return 0.35;
                const raw = node.spectrum_index !== undefined ? node.spectrum_index : node.spectrumIndex;
                if (typeof raw === 'number' && isFinite(raw)) return Math.min(1, Math.max(0, raw));
                const sev = String(node.severity || '').toLowerCase();
                const map = { critical: 0.92, high: 0.7, medium: 0.45, low: 0.2 };
                return map[sev] !== undefined ? map[sev] : 0.35;
            }

            getConvergenceValue(node) {
                if (!node) return 0.0;
                const raw = node.convergence !== undefined ? node.convergence : node.convergenceIndex;
                if (typeof raw === 'number' && isFinite(raw)) return Math.min(1, Math.max(0, raw));
                return 0.0;
            }

            getRecencyValue(node) {
                if (!node) return 0.5;
                const raw = node.recency !== undefined ? node.recency : null;
                if (typeof raw === 'number' && isFinite(raw)) return Math.min(1, Math.max(0, raw));
                if (node.timestamp) {
                    const age = (Date.now() / 1000) - node.timestamp;
                    const half = 48 * 3600;
                    return Math.exp(-Math.log(2) * Math.max(0, age) / half);
                }
                return 0.5;
            }

            clampValue(value, min, max) {
                return Math.max(min, Math.min(max, value));
            }

            getConfidenceValue(node) {
                if (!node) return 0.5;
                const raw = node.confidence !== undefined ? node.confidence : null;
                if (typeof raw === 'number' && isFinite(raw)) {
                    return Math.min(1, Math.max(0, raw));
                }
                return 0.5;
            }

            computeNodeRadius(node) {
                const volume = node.volume_weight || node.volumeWeight || node.volume_count || node.volumeCount || 1;
                const base = CONFIG.nodeRadius.base;
                const scale = CONFIG.nodeRadius.scale;
                const radius = base + (scale * Math.log1p(Math.max(1, volume)));
                return this.clampValue(radius, CONFIG.nodeRadius.min, CONFIG.nodeRadius.max);
            }

            getSpectrumBand(node, bandCount) {
                const spec = this.getSpectrumValue(node);
                const idx = Math.floor(spec * bandCount);
                return Math.max(0, Math.min(bandCount - 1, idx));
            }

            computeBandStats(nodes) {
                let specSum = 0;
                let confSum = 0;
                const colorSum = new THREE.Color(0, 0, 0);
                nodes.forEach(node => {
                    const spec = this.getSpectrumValue(node);
                    const conf = this.getConfidenceValue(node);
                    const c = new THREE.Color(this.getIntegratedNodeColor(node));
                    specSum += spec;
                    confSum += conf;
                    colorSum.r += c.r;
                    colorSum.g += c.g;
                    colorSum.b += c.b;
                });
                const count = Math.max(1, nodes.length);
                return {
                    spectrum: specSum / count,
                    confidence: confSum / count,
                    color: new THREE.Color(colorSum.r / count, colorSum.g / count, colorSum.b / count)
                };
            }

            boostNodeColor(input) {
                const color = new THREE.Color(input || CONFIG.nodeColor);
                const hsl = { h: 0, s: 0, l: 0 };
                color.getHSL(hsl);
                hsl.s = Math.min(1, hsl.s * 1.7);
                hsl.l = Math.min(1, hsl.l * 1.6);
                const out = new THREE.Color();
                out.setHSL(hsl.h, hsl.s, hsl.l);
                return out;
            }

            createGlassMaterial(stats) {
                const spec = stats.spectrum;
                const conf = stats.confidence;
                const opacity = this.clampValue(0.84 + (conf * 0.08), 0.8, 0.94);
                const transmission = this.clampValue(0.2 + (spec * 0.12), 0.18, 0.36);
                const roughness = this.clampValue(0.16 - (spec * 0.08), 0.05, 0.22);
                const emissiveIntensity = this.clampValue(0.2 + (spec * 0.16), 0.16, 0.42);
                const emissiveColor = stats.color ? stats.color.clone().multiplyScalar(0.52) : new THREE.Color(0x101418);
                const flakeStrength = this.clampValue(0.24 + (spec * 0.24) + (conf * 0.08), 0.2, 0.52);
                const flakeScale = 24 + (spec * 14);

                const material = new THREE.MeshPhysicalMaterial({
                    color: 0xffffff,
                    transparent: true,
                    opacity,
                    transmission,
                    roughness,
                    metalness: 0.62,
                    clearcoat: 1.0,
                    clearcoatRoughness: 0.08,
                    ior: 1.52,
                    thickness: 1.45,
                    reflectivity: 1.0,
                    emissive: emissiveColor,
                    emissiveIntensity,
                    vertexColors: true
                });
                material.onBeforeCompile = (shader) => {
                    shader.uniforms.uCrystalTime = { value: 0 };
                    shader.uniforms.uFlakeStrength = { value: flakeStrength };
                    shader.uniforms.uFlakeScale = { value: flakeScale };
                    shader.fragmentShader = shader.fragmentShader
                        .replace(
                            '#include <common>',
                            `#include <common>
uniform float uCrystalTime;
uniform float uFlakeStrength;
uniform float uFlakeScale;
float crystalHash(vec3 p) {
    p = fract(p * 0.1031);
    p += dot(p, p.yzx + 33.33);
    return fract((p.x + p.y) * p.z);
}
`
                        )
                        .replace(
                            '#include <dithering_fragment>',
                            `float flakeField = crystalHash(floor(vViewPosition * uFlakeScale));
float flakeMask = smoothstep(0.962, 1.0, flakeField);
float flicker = 0.72 + 0.28 * sin((uCrystalTime * 1.7) + (flakeField * 45.0));
float viewFactor = pow(1.0 - clamp(abs(normalize(vViewPosition).z), 0.0, 1.0), 1.8);
float sparkle = flakeMask * flicker * (0.35 + viewFactor);
gl_FragColor.rgb += vec3(1.0, 0.95, 0.86) * sparkle * uFlakeStrength;
#include <dithering_fragment>`
                        );
                    material.userData.crystalUniforms = shader.uniforms;
                };
                material.depthWrite = false;
                material.depthTest = true;
                return material;
            }

            syncInstance(proxy) {
                if (!proxy || !proxy.instanceMesh) return;
                proxy.updateMatrix();
                proxy.instanceMesh.setMatrixAt(proxy.instanceId, proxy.matrix);
                proxy.instanceMesh.instanceMatrix.needsUpdate = true;
                if (proxy.glowMesh !== undefined && proxy.glowMesh !== null) {
                    const glowScale = (proxy.scale && proxy.scale.x ? proxy.scale.x : (proxy.baseScale || 1.0)) * 1.05;
                    this._glowTemp.position.copy(proxy.position);
                    this._glowTemp.scale.setScalar(glowScale);
                    this._glowTemp.updateMatrix();
                    proxy.glowMesh.setMatrixAt(proxy.glowInstanceId, this._glowTemp.matrix);
                    proxy.glowMesh.instanceMatrix.needsUpdate = true;
                }
                if (proxy.coreGlowMesh !== undefined && proxy.coreGlowMesh !== null) {
                    const coreScale = (proxy.scale && proxy.scale.x ? proxy.scale.x : (proxy.baseScale || 1.0)) * 0.86;
                    this._glowTemp.position.copy(proxy.position);
                    this._glowTemp.scale.setScalar(coreScale);
                    this._glowTemp.updateMatrix();
                    proxy.coreGlowMesh.setMatrixAt(proxy.coreGlowInstanceId, this._glowTemp.matrix);
                    proxy.coreGlowMesh.instanceMatrix.needsUpdate = true;
                }
            }

            resolveProxyFromHit(hit) {
                if (!hit || !hit.object) return null;
                const idx = hit.instanceId;
                if (idx === undefined || idx === null) return null;
                const map = hit.object.userData && hit.object.userData.instanceIdToProxy;
                const proxy = map ? map[idx] : null;
                if (!proxy || proxy.visible === false) return null;
                return proxy;
            }

            hashScalar(seed) {
                const text = String(seed || '');
                let hash = 0;
                for (let i = 0; i < text.length; i++) {
                    hash = ((hash << 5) - hash) + text.charCodeAt(i);
                    hash |= 0;
                }
                return (Math.abs(hash) % 1000) / 1000;
            }

            sampleNodes(pool, count, excludeId, seed) {
                if (!Array.isArray(pool) || pool.length <= count) return pool || [];
                const picked = [];
                const used = new Set();
                const total = pool.length;
                const stride = 97;
                let cursor = Math.abs(this.hashScalar(seed) * total);
                while (picked.length < count && used.size < total) {
                    const idx = Math.floor(cursor % total);
                    if (!used.has(idx)) {
                        used.add(idx);
                        const node = pool[idx];
                        if (node && node.id !== excludeId) {
                            picked.push(node);
                        }
                    }
                    cursor += stride;
                }
                return picked;
            }

            init() {
                // Scene setup
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(CONFIG.backgroundColor);

                // Camera setup
                this.camera = new THREE.PerspectiveCamera(
                    75,
                    window.innerWidth / window.innerHeight,
                    0.1,
                    4000
                );
                this.camera.position.set(0, 0, 420);

                // Renderer setup
                this.renderer = new THREE.WebGLRenderer({
                    canvas: document.getElementById('three-canvas'),
                    antialias: true,
                    alpha: false,
                    powerPreference: 'high-performance',

                    stencil: false,
                    depth: true
                });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                const pixelRatioCap = (CONFIG.performance && CONFIG.performance.maxPixelRatio)
                    ? CONFIG.performance.maxPixelRatio
                    : window.devicePixelRatio;
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, Math.max(2.0, pixelRatioCap)));
                this.renderer.outputColorSpace = THREE.SRGBColorSpace;
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.05;
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;

                // Controls setup

                this.controls.enablePan = true;
                this.controls.enableZoom = true;
                this.controls.enableRotate = true;

                // Lighting setup

                // Show UI

            }

            setupLighting() {
                // Ambient light
                const ambientLight = new THREE.AmbientLight(0x3b3b3b, 0.45);
                this.scene.add(ambientLight);

                const hemiLight = new THREE.HemisphereLight(0x4a6a8f, 0x0c0c0c, 0.3);
                this.scene.add(hemiLight);

                // Point lights for glass refraction highlights
                const cameraLight = new THREE.PointLight(0x66CCFF, 1.25, 0, 2);
                cameraLight.position.set(0, 0, 180);
                this.camera.add(cameraLight);
                this.scene.add(this.camera);

                const centerLight = new THREE.PointLight(0x4499FF, 1.0, 0, 2);
                centerLight.position.set(0, 0, 0);
                this.scene.add(centerLight);

                // Key light
                const keyLight = new THREE.DirectionalLight(0x00E5FF, 0.9);
                keyLight.position.set(100, 100, 50);
                keyLight.castShadow = true;
                keyLight.shadow.mapSize.width = 2048;
                keyLight.shadow.mapSize.height = 2048;
                this.scene.add(keyLight);

                // Fill light
                const fillLight = new THREE.DirectionalLight(0x0080FF, 0.5);
                fillLight.position.set(-100, -100, -50);
                this.scene.add(fillLight);

                // Rim light

            setupEventListeners() {
                // Window resize
                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                    const pixelRatioCap = (CONFIG.performance && CONFIG.performance.maxPixelRatio)
                        ? CONFIG.performance.maxPixelRatio
                        : window.devicePixelRatio;
                    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, Math.max(2.0, pixelRatioCap)));
                    const edges = this.edgeLines.concat(this.proxyEdges || []);
                    edges.forEach(line => {
                        if (line && line.material && line.material.resolution) {
                            line.material.resolution.set(window.innerWidth, window.innerHeight);
                        }
                    });
                });

                // Mouse events
                this.renderer.domElement.addEventListener('click', (event) => {
                    this.handleNodeClick(event);
                });
                this.renderer.domElement.addEventListener('pointerdown', (event) => {
                    this.handlePointerDown(event);
                });
                window.addEventListener('pointermove', (event) => {
                    this.handlePointerMove(event);
                });
                window.addEventListener('pointerup', () => {
                    this.handlePointerUp();
                });

                // Control buttons
                document.getElementById('fit-button').addEventListener('click', () => {

                });

                document.getElementById('spin-button').addEventListener('click', () => {

                });

                const tumblerButton = document.getElementById('tumbler-button');
                if (tumblerButton) {
                    tumblerButton.addEventListener('click', () => {
                        this.spinSplit = !this.spinSplit;
                        tumblerButton.classList.toggle('active', this.spinSplit);
                        tumblerButton.textContent = this.spinSplit ? 'Tumbler: Split' : 'Tumbler: Unified';
                    });
                }

                document.getElementById('reset-button').addEventListener('click', () => {
                    this.resetView();
                });

                if (this.controls && this.controls.addEventListener) {
                    this.controls.addEventListener('change', () => {
                        this.allowAutoExpand = true;
                    });
                }

                const panelClose = document.getElementById('panel-close');
                if (panelClose) {
                    panelClose.addEventListener('click', () => {
                        this.deselectNode();
                    });
                }

                document.getElementById('search-input').addEventListener('input', (e) => {
                    this.searchNodes(e.target.value);
                });
                const timeToggle = document.getElementById('time-toggle');
                if (timeToggle) {
                    timeToggle.querySelectorAll('[data-window]').forEach(btn => {
                        btn.addEventListener('click', () => {
                            timeToggle.querySelectorAll('[data-window]').forEach(el => el.classList.remove('active'));
                            btn.classList.add('active');
                            this.timeWindow = btn.getAttribute('data-window') || 'all';
                            this.applyLocalFilter();
                        });
                    });
                }
                document.querySelectorAll('[data-edge]').forEach(toggle => {
                    toggle.addEventListener('change', () => {
                        this.activeEdgeTypes = null;
                        this.createVisualization();
                    });
                });

                // Legend resize handle
                const legend = document.getElementById('legend');
                const resizer = document.getElementById('legend-resizer');
                if (legend && resizer) {
                    let resizing = false;
                    let startX = 0;
                    let startWidth = 0;
                    const minWidth = 200;
                    const maxWidth = Math.max(260, Math.floor(window.innerWidth * 0.45));

                    const onMouseMove = (e) => {
                        if (!resizing) return;
                        const delta = startX - e.clientX;
                        const next = Math.max(minWidth, Math.min(maxWidth, startWidth + delta));
                        legend.style.width = `${next}px`;
                    };

                    const onMouseUp = () => {
                        if (!resizing) return;
                        resizing = false;
                        document.body.style.cursor = '';
                    };

                    resizer.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                        resizing = true;
                        startX = e.clientX;
                        startWidth = legend.getBoundingClientRect().width;
                        document.body.style.cursor = 'ew-resize';
                    });

                    window.addEventListener('mousemove', onMouseMove);
                    window.addEventListener('mouseup', onMouseUp);
                }
            }

            async loadData() {
                const overlay = document.getElementById('loading-overlay');
                const failSafe = setTimeout(() => {
                    if (overlay) overlay.style.display = 'none';
                    this.updateStatus('Loading delayed — retrying in background...');
                }, 20000);
                try {
                    this.updateStatus('Fetching intelligence data...');
                    const { data, response } = await this.fetchGraphPayload();
                    console.log('[3D] Received data', { nodes: (data.nodes || []).length, edges: (data.edges || []).length });

                    this.nodes = data.nodes || [];
                    this.edges = data.edges || [];
                    this.metaSources = (data.meta && Array.isArray(data.meta.sources)) ? data.meta.sources : (data.metadata && Array.isArray(data.metadata.sources) ? data.metadata.sources : null);
                    this.metaClusters = (data.metadata && Array.isArray(data.metadata.clusters)) ? data.metadata.clusters : (data.meta && Array.isArray(data.meta.clusters) ? data.meta.clusters : null);
                    this.mergeSourceDefsFromNodes();

                    this.updateStatus(`Loaded ${this.nodes.length} nodes, ${this.edges.length} connections`);

                    // prefer built_at header when server strips meta payload
                    const hdrBuilt = parseInt(response.headers.get('X-Graph-Built-At') || '0') || null;

                    // fallback: fetch explicit meta endpoint to get built_at if header/payload lacks it
                    if (hdrBuilt) {
                        this.builtAt = hdrBuilt;
                    } else {
                        const canFetchMeta = this.graphEndpoint === '/graph_3d.json';
                        if (canFetchMeta) {
                            try {
                                const metaResp = await fetch('/graph_3d/meta');
                                if (metaResp.ok) {
                                    const metaJson = await metaResp.json();
                                    this.builtAt = metaJson.meta && metaJson.meta.built_at ? metaJson.meta.built_at : null;
                                } else {
                                    console.warn('[3D] /graph_3d/meta returned', metaResp.status);
                                    this.builtAt = (data.meta && data.meta.built_at) ? data.meta.built_at : null;
                                }
                            } catch (e) {
                                console.warn('[3D] Failed to fetch /graph_3d/meta', e);
                                this.builtAt = (data.meta && data.meta.built_at) ? data.meta.built_at : null;
                            }
                        } else {
                            this.builtAt = (data.meta && data.meta.built_at) ? data.meta.built_at : null;
                        }
                    }

                    this.processData();
                    this.createVisualization();
                    this.fitCameraToNodes();
                    this.layoutSafetyActiveUntil = Date.now() + 2600;
                    if (this.loadRetryHandle) {
                        clearTimeout(this.loadRetryHandle);
                        this.loadRetryHandle = null;
                    }

                    // Hide loading overlay
                    if (overlay) overlay.style.display = 'none';

                    // Start polling for updates only when explicitly enabled
                    if (this.enablePolling && !this.pollHandle) {
                        this.pollHandle = setInterval(() => this.pollData(), this.pollIntervalMs || 10000);
                    }

                    // Update legend using fetched source defs (ensures all sources visible)
                    this.safeUpdateLegend();

                } catch (error) {
                    console.error('[3D] Failed to load graph data:', error);
                    this.updateStatus('Waiting for intelligence data...');
                    this.scheduleLoadRetry();
                    if (overlay) overlay.style.display = 'none';
                } finally {
                    clearTimeout(failSafe);
                }
            }

            async pollData() {
                if (!this.enablePolling) return;
                try {
                    // Poll the active 3D payload so we pick up computed layout changes
                    const { data, response } = await this.fetchGraphPayload();
                    const hdrBuilt = parseInt(response.headers.get('X-Graph-Built-At') || '0') || null;
                    let newBuiltAt = hdrBuilt ? hdrBuilt : ((data.meta && data.meta.built_at) ? data.meta.built_at : null);
                    if (!newBuiltAt) {
                        if (this.graphEndpoint === '/graph_3d.json') {
                            try {
                                const metaResp = await fetch('/graph_3d/meta');
                                if (metaResp.ok) {
                                    const metaJson = await metaResp.json();
                                    newBuiltAt = metaJson.meta && metaJson.meta.built_at ? metaJson.meta.built_at : null;
                                }
                            } catch (e) {
                                console.warn('[3D] Poll: failed to fetch meta', e);
                            }
                        }
                    }
                    const newNodeCount = (data.nodes || []).length;
                    const newEdgeCount = (data.edges || []).length;

                    // Update if the exporter reports a new build timestamp OR node/edge counts changed
                    if (newBuiltAt !== this.builtAt || newNodeCount !== this.nodes.length || newEdgeCount !== this.edges.length) {
                        console.log('[3D] Detected graph change - updating visualization');
                        const snapshot = this.captureNodePositions();
                        this.materializePositions = snapshot.map;
                        this.materializeOrigin = snapshot.origin;
                        this.pendingMaterialize = true;
                        this.nodes = data.nodes || [];
                        this.edges = data.edges || [];
                        this.metaSources = (data.meta && Array.isArray(data.meta.sources)) ? data.meta.sources : (data.metadata && Array.isArray(data.metadata.sources) ? data.metadata.sources : null);
                        this.metaClusters = (data.metadata && Array.isArray(data.metadata.clusters)) ? data.metadata.clusters : (data.meta && Array.isArray(data.meta.clusters) ? data.meta.clusters : null);
                        this.mergeSourceDefsFromNodes();
                        this.builtAt = newBuiltAt;
                        this.processData();
                        this.createVisualization();
                        this.startMaterialize();
                        this.updateStatus(`Updated ${this.nodes.length} nodes, ${this.edges.length} edges`);
                    }
                    // Always refresh the legend order/counts without reloading the whole page
                    this.safeUpdateLegend();
                } catch (e) {
                    console.warn('[3D] Poll failed', e);
                }
            }



            processData() {
                const sourceKeys = Array.from(new Set(this.nodes.map(n => this.getSourceKey(n)).filter(Boolean))).sort();
                const triAxis = CONFIG.triAxis || {};
                const laneCount = Math.max(3, triAxis.laneCount || 3);
                const centerLane = Math.floor(laneCount / 2);
                const bandSpacing = triAxis.laneSpacing || (CONFIG.sourceBands ? CONFIG.sourceBands.spacing : 220);
                const bandJitter = (triAxis.laneJitter !== undefined && triAxis.laneJitter !== null)
                    ? triAxis.laneJitter
                    : (CONFIG.sourceBands ? CONFIG.sourceBands.jitter : 18);
                const laneSpin = Array.isArray(triAxis.laneSpin) ? triAxis.laneSpin : [1, -1, 1];
                const laneCounts = Array.from({ length: laneCount }, () => 0);
                const sourceLaneMap = {};
                const assignLane = (predicate, laneIndex) => {
                    sourceKeys.forEach(key => {
                        if (sourceLaneMap[key] !== undefined) return;
                        if (!predicate(key)) return;
                        sourceLaneMap[key] = laneIndex;
                        laneCounts[laneIndex] += 1;
                    });
                };
                assignLane((key) => {
                    const lower = String(key || '').toLowerCase();
                    return lower.includes('threatfox') || lower.includes('abuse.ch') || lower.includes('malware');
                }, 0);
                assignLane((key) => String(key || '').toLowerCase().includes('urlhaus'), 1 % laneCount);
                assignLane((key) => {
                    const lower = String(key || '').toLowerCase();
                    return lower.includes('ransomware') || lower.includes('extortion');
                }, 2 % laneCount);
                sourceKeys.forEach(key => {
                    if (sourceLaneMap[key] !== undefined) return;
                    let targetLane = 0;
                    let minCount = laneCounts[0];
                    for (let i = 1; i < laneCount; i++) {
                        if (laneCounts[i] < minCount) {
                            minCount = laneCounts[i];
                            targetLane = i;
                        }
                    }
                    sourceLaneMap[key] = targetLane;
                    laneCounts[targetLane] += 1;
                });

                const bandMap = {};
                sourceKeys.forEach((key) => {
                    const laneIndex = sourceLaneMap[key] !== undefined ? sourceLaneMap[key] : centerLane;
                    const offset = (laneIndex - centerLane) * bandSpacing;
                    bandMap[key] = offset;
                });
                this.sourceLaneMap = sourceLaneMap;
                this.sourceBandMap = bandMap;
                this.sourceSpinDirection = {};
                sourceKeys.forEach(key => {
                    const laneIndex = sourceLaneMap[key] !== undefined ? sourceLaneMap[key] : centerLane;
                    const laneDir = laneSpin[laneIndex] !== undefined ? laneSpin[laneIndex] : ((laneIndex % 2 === 0) ? 1 : -1);
                    this.sourceSpinDirection[key] = laneDir >= 0 ? 1 : -1;
                });
                const laneColorAccum = Array.from({ length: laneCount }, () => new THREE.Color(0, 0, 0));
                const laneColorCount = Array.from({ length: laneCount }, () => 0);
                sourceKeys.forEach(key => {
                    const laneIndex = sourceLaneMap[key] !== undefined ? sourceLaneMap[key] : centerLane;
                    const sourceColorHex = this.getSourceColor(key) || CONFIG.nodeColor;
                    const sourceColor = new THREE.Color(sourceColorHex);
                    laneColorAccum[laneIndex].r += sourceColor.r;
                    laneColorAccum[laneIndex].g += sourceColor.g;
                    laneColorAccum[laneIndex].b += sourceColor.b;
                    laneColorCount[laneIndex] += 1;
                });
                this.laneColorMap = {};
                for (let laneIndex = 0; laneIndex < laneCount; laneIndex++) {
                    let laneColor;
                    if (laneColorCount[laneIndex] > 0) {
                        laneColor = laneColorAccum[laneIndex].clone().multiplyScalar(1 / laneColorCount[laneIndex]);
                    } else {
                        laneColor = new THREE.Color(CONFIG.nodeColor);
                        laneColor.offsetHSL((laneIndex - centerLane) * 0.08, 0.18, 0.05);
                    }
                    this.laneColorMap[laneIndex] = `#${laneColor.getHexString()}`;
                }

                // Assign Z-planes based on data attributes, but preserve exported z if present
                this.nodes.forEach(node => {
                    const preserveLayout = !!(node.locked || node.parent_cluster || node.is_cluster);
                    node._preserveLayoutFlag = preserveLayout;
                    // If exporter provided a z coordinate, keep it
                    if (node.z !== undefined && node.z !== null) {
                        // preserve existing node.z
                    } else {
                        // Temporal plane (based on timestamp)
                        if (node.timestamp) {
                            const age = Date.now() / 1000 - node.timestamp;
                            const ageDays = age / (24 * 60 * 60);
                            node.z = CONFIG.zPlanes.temporal + (ageDays * 10); // Spread over time
                        }
                        // Confidence plane
                        else if (node.confidence !== undefined) {
                            node.z = CONFIG.zPlanes.confidence + (node.confidence * 50);
                        }
                        // Source plane
                        else {
                            node.z = CONFIG.zPlanes.source;
                        }
                    }

                    // Ensure coordinates exist (deterministic fallback)
                    if (node.x === undefined || node.x === null) {
                        const seedX = this.hashScalar(`${node.id}-x`);
                        node.x = (seedX - 0.5) * 400;
                    }
                    if (node.y === undefined || node.y === null) {
                        const seedY = this.hashScalar(`${node.id}-y`);
                        node.y = (seedY - 0.5) * 400;
                    }
                    node.z = (node.z !== undefined && node.z !== null) ? node.z : 0;

                    if (!preserveLayout) {
                        const sourceKey = this.getSourceKey(node);
                        const laneIndex = sourceLaneMap[sourceKey] !== undefined ? sourceLaneMap[sourceKey] : centerLane;
                        const baseLayerZ = bandMap[sourceKey] !== undefined ? bandMap[sourceKey] : ((laneIndex - centerLane) * bandSpacing);
                        const jitter = this.hashScalar(`${node.id}-zjitter`);
                        const fineNoise = (bandJitter * 0.05) * (jitter - 0.5);
                        const specOffset = (this.getSpectrumValue(node) - 0.5) * Math.min(6, bandJitter * 0.1);
                        node.z = baseLayerZ + specOffset + fineNoise;
                        node._axisLayer = laneIndex;
                        node._spinLayer = laneIndex;
                    }
                });
                // Arrange non-locked nodes into strict concentric rings around one shared axis.
                const triAxisForRings = CONFIG.triAxis || {};
                const layerBucketsForRings = Array.from({ length: laneCount }, () => []);
                this.nodes.forEach(node => {
                    if (!node || node._preserveLayoutFlag) return;
                    const sourceKey = this.getSourceKey(node);
                    const laneIndex = sourceLaneMap[sourceKey] !== undefined ? sourceLaneMap[sourceKey] : centerLane;
                    node._axisLayer = laneIndex;
                    node._spinLayer = laneIndex;
                    layerBucketsForRings[laneIndex].push(node);
                });
                const ringRadius = (triAxisForRings.ringRadius !== undefined && triAxisForRings.ringRadius !== null) ? triAxisForRings.ringRadius : 210;
                const ringStep = (triAxisForRings.ringStep !== undefined && triAxisForRings.ringStep !== null) ? triAxisForRings.ringStep : 86;
                const ringNoise = (triAxisForRings.ringNoise !== undefined && triAxisForRings.ringNoise !== null) ? triAxisForRings.ringNoise : 3;
                const ringVariance = (triAxisForRings.ringVariance !== undefined && triAxisForRings.ringVariance !== null) ? triAxisForRings.ringVariance : 18;
                for (let layerIdx = 0; layerIdx < laneCount; layerIdx++) {
                    const bucket = layerBucketsForRings[layerIdx] || [];
                    if (!bucket.length) continue;
                    bucket.sort((a, b) => String(a.id || '').localeCompare(String(b.id || '')));
                    const total = bucket.length;
                    const layerRadius = Math.max(42, ringRadius + (layerIdx * ringStep));
                    bucket.forEach((node, idx) => {
                        const angle = (idx / Math.max(1, total)) * Math.PI * 2;
                        const spec = this.getSpectrumValue(node);
                        const radialBand = (spec - 0.5) * Math.min(8, ringVariance * 0.35);
                        const radialNoise = ringNoise * 0.6 * (this.hashScalar(`${node.id}-ring-r`) - 0.5);
                        const radius = Math.max(42, layerRadius + radialBand + radialNoise);
                        node.x = Math.cos(angle) * radius;
                        node.y = Math.sin(angle) * radius;
                        node._axisLayer = layerIdx;
                        node._spinLayer = layerIdx;
                    });
                }

                // Recentre nodes so auto-spin stays on a tight central axis
                if (this.nodes.length > 0) {
                    let sx = 0, sy = 0, sz = 0;
                    const centerPool = this.nodes.filter(n => !n._preserveLayoutFlag);
                    const pool = centerPool.length ? centerPool : this.nodes;
                    pool.forEach(n => { sx += n.x; sy += n.y; sz += n.z; });
                    const cx = sx / pool.length;
                    const cy = sy / pool.length;
                    const cz = sz / pool.length;
                    this.nodes.forEach(n => { n.x -= cx; n.y -= cy; n.z -= cz; });
                }
                this.spinHub.set(0, 0, 0);
                this.nodes.forEach(node => {
                    if (typeof node._spinLayer !== 'number' || !Number.isFinite(node._spinLayer)) {
                        node._spinLayer = centerLane;
                    }
                });
            }

            createVisualization() {
                // Clear existing meshes
                this.instancedMeshes.forEach(mesh => this.scene.remove(mesh));
                this.instancedGlowMeshes.forEach(mesh => this.scene.remove(mesh));
                this.instancedCoreGlowMeshes.forEach(mesh => this.scene.remove(mesh));
                this.edgeLines.forEach(line => this.scene.remove(line));
                this.clearProxyEdges();

                this.nodeMeshes = [];
                this.instancedMeshes = [];
                this.instancedGlowMeshes = [];
                this.instancedCoreGlowMeshes = [];
                this.edgeLines = [];
                this.nodesById = {};
                this.nodes.forEach(n => { if (n && n.id) this.nodesById[n.id] = n; });

                // Create nodes
                const active = this.getActiveSourceSet();
                const visibleById = {};
                this.nodes.forEach(node => {
                    if (!node || !node.id) return;
                    const sourceKey = this.getSourceKey(node);
                    visibleById[node.id] = !active || active.has(sourceKey);
                });
                const renderEdgeResult = this.buildRenderEdges(visibleById);
                const edgesToRender = renderEdgeResult.edges;

                this.adjacency = {};
                edgesToRender.forEach(edge => {
                    const sNode = this.nodesById[edge.source];
                    const tNode = this.nodesById[edge.target];
                    if (!sNode || !tNode) return;
                    const sKey = this.getSourceKey(sNode);
                    const tKey = this.getSourceKey(tNode);
                    if (sKey) {
                        this.adjacency[edge.source] = this.adjacency[edge.source] || {};
                        this.adjacency[edge.source][tKey] = (this.adjacency[edge.source][tKey] || 0) + 1;
                    }
                    if (tKey) {
                        this.adjacency[edge.target] = this.adjacency[edge.target] || {};
                        this.adjacency[edge.target][sKey] = (this.adjacency[edge.target][sKey] || 0) + 1;
                    }
                });
                this.nodeMeshesById = {};
                const bandCount = 6;
                const bandBuckets = Array.from({ length: bandCount }, () => []);
                this.nodes.forEach(node => {
                    const band = this.getSpectrumBand(node, bandCount);
                    bandBuckets[band].push(node);
                });

                if (!this.sharedNodeGeometry) {
                    this.sharedNodeGeometry = new THREE.SphereGeometry(1, 24, 24);
                }

                bandBuckets.forEach((bucket, bandIndex) => {
                    if (!bucket.length) return;
                    const stats = this.computeBandStats(bucket);
                    const material = this.createGlassMaterial(stats);
                    const glowMaterial = new THREE.MeshBasicMaterial({
                        transparent: true,
                        opacity: 0.45,
                        blending: THREE.AdditiveBlending,
                        depthWrite: false,
                        vertexColors: true
                    });
                    const coreGlowMaterial = new THREE.MeshBasicMaterial({
                        transparent: true,
                        opacity: 0.4,
                        blending: THREE.AdditiveBlending,
                        depthWrite: false,
                        vertexColors: true
                    });
                    const mesh = new THREE.InstancedMesh(this.sharedNodeGeometry, material, bucket.length);
                    mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
                    mesh.renderOrder = 3;
                    mesh.frustumCulled = false;
                    mesh.userData.instanceIdToProxy = [];
                    mesh.userData.bandIndex = bandIndex;
                    const glowMesh = new THREE.InstancedMesh(this.sharedNodeGeometry, glowMaterial, bucket.length);
                    glowMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
                    glowMesh.renderOrder = 2;
                    glowMesh.frustumCulled = false;
                    const coreGlowMesh = new THREE.InstancedMesh(this.sharedNodeGeometry, coreGlowMaterial, bucket.length);
                    coreGlowMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
                    coreGlowMesh.renderOrder = 2;
                    coreGlowMesh.frustumCulled = false;

                    bucket.forEach((node, i) => {
                        const sourceKey = this.getSourceKey(node);
                        const radius = this.computeNodeRadius(node);
                        const proxy = new THREE.Object3D();
                        proxy.userData = node;
                        proxy.userData.sourceKey = sourceKey;
                        const targetPos = new THREE.Vector3(node.x, node.y, node.z);
                        let startPos = targetPos;
                        let isNew = false;
                        if (this.materializePositions && this.materializePositions.size > 0) {
                            const prev = this.materializePositions.get(node.id);
                            if (prev) {
                                startPos = prev.clone();
                            } else {
                                startPos = this.materializeOrigin ? this.materializeOrigin.clone() : targetPos.clone();
                                isNew = true;
                            }
                        }
                        proxy.userData._materializeStart = startPos.clone();
                        proxy.userData._materializeTarget = targetPos.clone();
                        proxy.userData._materializeNew = isNew;
                        const materializeScale = isNew ? 0.02 : 1.0;
                        proxy.userData._materializeScale = materializeScale;
                        proxy.baseScale = radius;
                        proxy.userData._pulseBase = radius * materializeScale;
                        proxy.position.copy(startPos);
                        proxy.scale.setScalar(radius * materializeScale);
                        proxy.visible = !active || active.has(sourceKey);
                        proxy.instanceMesh = mesh;
                        proxy.instanceId = i;
                        proxy.glowMesh = glowMesh;
                        proxy.glowInstanceId = i;
                        proxy.coreGlowMesh = coreGlowMesh;
                        proxy.coreGlowInstanceId = i;
                        proxy.updateMatrix();
                        const rawColor = new THREE.Color(this.getIntegratedNodeColor(node));
                        const boosted = this.boostNodeColor(rawColor);
                        const glowOverride = node && (node.glow_color || node.glowColor || node.glow);
                        const glowColor = glowOverride ? new THREE.Color(glowOverride) : boosted;
                        mesh.setMatrixAt(i, proxy.matrix);
                        mesh.setColorAt(i, rawColor);
                        proxy.userData._baseColor = `#${rawColor.getHexString()}`;
                        const glowScale = radius * 1.08;
                        this._glowTemp.position.copy(proxy.position);
                        this._glowTemp.scale.setScalar(glowScale);
                        this._glowTemp.updateMatrix();
                        glowMesh.setMatrixAt(i, this._glowTemp.matrix);
                        glowMesh.setColorAt(i, glowColor);
                        const coreScale = radius * 0.92;
                        this._glowTemp.position.copy(proxy.position);
                        this._glowTemp.scale.setScalar(coreScale);
                        this._glowTemp.updateMatrix();
                        coreGlowMesh.setMatrixAt(i, this._glowTemp.matrix);
                        coreGlowMesh.setColorAt(i, glowColor);
                        this.nodeMeshes.push(proxy);
                        if (proxy.userData && proxy.userData.id) {
                            this.nodeMeshesById[proxy.userData.id] = proxy;
                        }
                        mesh.userData.instanceIdToProxy[i] = proxy;
                    });

                    if (mesh.instanceColor) {
                        mesh.instanceColor.needsUpdate = true;
                    }
                    mesh.instanceMatrix.needsUpdate = true;
                    if (glowMesh.instanceColor) {
                        glowMesh.instanceColor.needsUpdate = true;
                    }
                    glowMesh.instanceMatrix.needsUpdate = true;
                    if (coreGlowMesh.instanceColor) {
                        coreGlowMesh.instanceColor.needsUpdate = true;
                    }
                    coreGlowMesh.instanceMatrix.needsUpdate = true;
                    this.scene.add(coreGlowMesh);
                    this.instancedCoreGlowMeshes.push(coreGlowMesh);
                    this.scene.add(glowMesh);
                    this.instancedGlowMeshes.push(glowMesh);
                    this.scene.add(mesh);
                    this.instancedMeshes.push(mesh);
                });

                this.initClusters();

                // Create edges
                edgesToRender.forEach(edge => {
                    const line = this.createEdgeLine(edge);
                    if (line) {
                        // edge visible only if both endpoints' sources are active
                        const sNode = this.nodesById[edge.source];
                        const tNode = this.nodesById[edge.target];
                        const s = this.getSourceKey(sNode);
                        const t = this.getSourceKey(tNode);
                        const svis = !active || active.has(s);
                        const tvis = !active || active.has(t);
                        line.visible = svis && tvis;
                        this.edgeLines.push(line);
                        this.scene.add(line);
                    }
                });

                this.initPhysics();
                this.applyClusterDefaults();

                // Update legend
                this.safeUpdateLegend();
                this.applyLocalFilter();
                this.searchNodes(this.searchQuery || '');
            }

            initClusters() {
                this.clusters = {};
                this.nodeMeshes.forEach(proxy => {
                    const node = proxy && proxy.userData;
                    if (!node) return;
                    if (node.is_cluster) {
                        this.clusters[node.id] = this.clusters[node.id] || { centroid: null, childIds: new Set(), collapsed: !!node.collapsed };
                        this.clusters[node.id].centroid = proxy;
                        this.clusters[node.id].collapsed = !!node.collapsed;
                    }
                    if (node.parent_cluster) {
                        this.clusters[node.parent_cluster] = this.clusters[node.parent_cluster] || { centroid: null, childIds: new Set(), collapsed: true };
                        this.clusters[node.parent_cluster].childIds.add(node.id);
                    }
                });
            }

            applyClusterDefaults() {
                this.clearProxyEdges();
                if (Array.isArray(this.metaClusters)) {
                    this.metaClusters.forEach(item => {
                        if (!item || !item.id) return;
                        const cluster = this.clusters[item.id];
                        if (!cluster) return;
                        if (typeof item.default_collapsed === 'boolean') {
                            cluster.collapsed = item.default_collapsed;
                        }
                    });
                }
                Object.keys(this.clusters || {}).forEach(id => {
                    const cluster = this.clusters[id];
                    if (!cluster) return;
                    if (cluster.collapsed) {
                        this.setClusterCollapsed(id, true, true, true);
                    }
                });
            }

            setClusterCollapsed(clusterId, collapsed, skipFilter, force) {
                const cluster = this.clusters[clusterId];
                if (!cluster) return;
                if (!force && cluster.collapsed === collapsed) return;
                cluster.collapsed = collapsed;

                cluster.childIds.forEach(childId => {
                    const proxy = this.nodeMeshesById[childId];
                    if (!proxy) return;
                    proxy.visible = !collapsed;
                    const matScale = (proxy.userData && proxy.userData._materializeScale !== undefined)
                        ? proxy.userData._materializeScale
                        : 1.0;
                    const scale = proxy.visible ? (proxy.baseScale || 1.0) * matScale : 0.0001;
